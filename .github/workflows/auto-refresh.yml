name: Auto refresh stock themes

on:
  schedule:
    - cron: '10 0,9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh news cache and generated pages
        run: |
          node scripts/discover-auto-themes.js
          node scripts/refresh-news-cache.js
          node scripts/generate-theme-pages.js

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/auto-themes.json data/news-cache.json sitemap.xml *.html
          git commit -m "Auto refresh stock theme news"
          git push
